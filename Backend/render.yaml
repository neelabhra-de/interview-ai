services:
  - type: web
    name: interview-ai-backend
    env: node
    buildCommand: >
      apt-get update &&
      apt-get install -y google-chrome-stable &&
      npm install &&
      npx puppeteer browsers install chrome
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
